<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Tienda de Plantas</title>
	<link rel="stylesheet" href="styles.css">
</head>

<body>

	<div class="contenedor-web">

		<article class="tarjeta-planta">
			<div class="imagen-contenedor">
				<span class="etiqueta">Fácil cuidado</span>
				<img src="https://images.unsplash.com/photo-1485955900006-10f4d324d411?auto=format&fit=crop&q=80&w=400"
					alt="Planta Monstera en maceta">
			</div>

			<div class="info-planta">
				<h2 class="titulo-planta">Monstera Deliciosa</h2>
				<p class="descripcion-planta">Ideal para interiores. Dale un toque tropical a tu sala con esta belleza de hojas
					perforadas.</p>

				<div class="compra-contenedor">
					<span class="precio">$450 MXN</span>
					<button class="btn-añadir">Añadir al carrito</button>
				</div>
			</div>
		</article>

	</div>

</body>

</html>
