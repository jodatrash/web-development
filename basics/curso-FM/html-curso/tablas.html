<!DOCTYPE html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tablas</title>
  </head>
  <body>
    <table>
      <!-- table - Define una tabla -->
      <!-- tr - table rows / filas -->
      <!-- td - table data / información -->
      <!-- th - table heading / encabezado -->

      <!-- Etiquetas semanticas, le sirven al navegador y buscadores -->
      <!-- thead - Encabezado de una tabla -->
      <!-- tbody - Cuerpo de una tabla -->
      <!-- tfoot - Pie de página de una tabla -->
      <thead>
        <tr>
          <td>nombre:</td>
          <td>telefono:</td>
          <td>direccion:</td>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Jonathan</td>
          <td>1231231231</td>
          <td>lorem</td>
        </tr>
        <tr>
          <td>test</td>
          <td>32132132112</td>
          <td>lorem</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
