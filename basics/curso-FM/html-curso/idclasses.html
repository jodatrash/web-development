<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ID - CLASSES</title>
  <style>
    #enlace-one,
    #enlace-one,
    #enlace-one {
      color: white;
      text-decoration: none;
      background-color: black;
    }

    .btn-one {
      color: red;
      background-color: black;
    }

    .btn-dos {
      color: aquamarine;
      background-color: black;
    }

    .btn-tres {
      color: yellow;
      background-color: black;
    }
  </style>
</head>

<body>
  <!-- Cada ID  debe ser unico. -->
  <!-- y con js podemos acceder a cada enlace -->
  <!-- ID normalmente se requiere para trabajar con javascript -->
  <a href="#" id="enlace-one">Enlace 1</a>
  <a href="#" id="enlace-dos">Enlace 2</a>
  <a href="#" id="enlace-tres">Enlace 3</a>
  <br>
  <!-- CLASS - Si se deberia usar para dar estilos/atributos css -->
  <a href="#" class="btn-one">Enlace 1</a>
  <a href="#" class="btn-dos">Enlace 2</a>
  <a href="#" class="btn-tres">Enlace 3</a>
  <br>
  <a href="#" data-action="delete-post">Enlace con acción personalizada</a>
</body>

</html>
