<!DOCTYPE html>
<html lang="es-MX">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Inputs</title>
</head>

<body>
    <form action="">
        <!-- email -->
        <input type="email" name="correo" id="correo" placeholder="example@emai.com">
        <br>
        <!-- password -->
        <input type="password" name="password" id="password" placeholder="Escribe tu contraseña">
        <br>
        <!-- number -->
        <input type="number" name="" id="" min="0" max="10" value="0" placeholder="0">
        <br>
        <!-- file -->
        <input type="file" name="" id="" accept=".png,.pdf" multiple>
        <br>
        <!-- range -->
        <input type="range" name="" id="" min="0" max="100">
        <br>
        <!--color-->
        <input type="color" name="" id="">
        <br>-
        <!--date-->
        <input type="date" name="" id="" value="2026-01-01" min="2020-01-01" max="2027-01-01">
        <br>
        <!--date time local-->
        <input type="datetime-local" name="" id="">
        <br>
        <!--time-->
        <input type="time">
        <br>
        <!--hidden-->
        <input type="hidden" name="valor-oculto" value="valor oculto">
        <br>
        <!--image-->
        <input type="image" src="../src/desktop.jpg" alt="" width="250" height="150">
        <br>
        <!--reset-->
        <input type="reset" value="Resetear formulario">
        <br>
        <!--Submit-->
        <input type="submit" value="Enviar">
        <button type="submit">Enviar</button>
    </form>
</body>

</html>
