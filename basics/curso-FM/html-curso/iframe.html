<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<!-- Atributos:
  src: indica la direccion absoluta de donde carga el docu
  title: indica un titulo del documento que se va a cargar
  width: indica el ancho del recuadro
  height: infica el alto del recuadro
  frameborder="0": indica que no queremos borde sobre el recuadro
-->

<body>
  <iframe width="560" height="315" src="https://www.youtube.com/embed/oVE3ZScG7B0?si=iaG551XfdP6Jy8Ix"
    title="YouTube video player" frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>

</html>
