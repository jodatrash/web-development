<!DOCTYPE html>
<html lang="en">

<head>
	<!-- Charset - Permite establecer la codificación del sitio -->
	<meta charset="UTF-8">
	<!-- viewport - Permite establecer el valor del viewport del sitio para responsivedesign -->
	<!-- El viewport es el area visible de una página web, controla como seran las dimensiones y escalas -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!-- Nos permite establecer una descripción del sitio -->
	<meta name="description" content="Sitio de diseño web">
	<title>Progress</title>
</head>

<body>
	<label for="progress">En progreso:</label>
	<progress id="progress"></progress>
	<br>
	<label for="progreso">50%</label>
	<progress id="progress2" value="50" max="100"></progress>
</body>

</html>
