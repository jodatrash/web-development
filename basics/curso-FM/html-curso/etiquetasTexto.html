<!DOCTYPE html>
<html lang="es-MX">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="style.css" />
	<title>Etiquetas de texto</title>
</head>

<body>
	<!-- El bold no tiene importancia semantica -->
	<b>Bold</b>
	<hr />
	<!-- Strong si tiene importancia semantica -->
	<strong>Strong</strong>
	<hr />
	<!-- Sin importancia semantica -->
	<i>Italic</i>
	<hr />
	<!-- Con importancia semantica -->
	<em>Emphasis</em>
	<hr />
	<mark>Mark</mark>
	<hr />
	<small>Small</small>
	<hr />
	<del>Deleted</del>
	<hr />
	<ins>Inserted</ins>
	<hr />
	<sub>Subscript</sub>
	<hr />
	<sup>Superscript</sup>
</body>

</html>
